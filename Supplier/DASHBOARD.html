<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DASHBOARD</title>
    <link rel="stylesheet" href="../css/supplier.css" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <h1><span class="blue-text">Event</span><span class="pink-text">Intel</span></h1>
                <div class="user-info">
                    <strong>Alvin John Jabla</strong>
                    <span class="supplier"><i class="fas fa-circle"></i> Supplier</span>
                </div>
            </div>
            <nav class="nav-menu">
                <ul>
                    <li class="active"><button onclick="location.href='DASHBOARD.html'">DASHBOARD</button></li>
                    <li><button onclick="location.href='BOOKINGS.html'">BOOKINGS</button></li>
                    <li><button onclick="location.href='SERVICES.html'">SERVICES</button></li>
                    <li><button onclick="location.href='MESSAGES.html'">MESSAGES</button></li>
                    <li><button onclick="location.href='REVIEWS.html'">REVIEWS</button></li>
                    <li><button onclick="location.href='SETTINGS.html'">SETTINGS</button></li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div id="header"></div>

<section class="booking-request">
                <h2>Booking Request</h2>
                <table class="booking-table">
                    <thead>
                        <tr>
                            <th>EVENT</th>
                            <th>DATE</th>
                            <th>BUDGET</th>
                            <th>ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>ANNIVERSARY 100PAX</td>
                            <td><span class="date">5/5/2020</span></td>
                            <td>55,000</td>
                            <td>
                                <button class="accept-btn">Accept</button>
                                <button class="decline-btn">Decline</button>
                            </td>
                        </tr>
                        <tr>
                            <td>BIRTHDAY 150 PAX</td>
                            <td><span class="date">5/5/2020</span></td>
                            <td>120,000</td>
                            <td>
                                <button class="accept-btn">Accept</button>
                                <button class="decline-btn">Decline</button>
                            </td>
                        </tr>
                        <tr>
                            <td>REUNION 100PAX</td>
                            <td><span class="date">4/22/2020</span></td>
                            <td>75,000</td>
                            <td>
                                <button class="accept-btn">Accept</button>
                                <button class="decline-btn">Decline</button>
                            </td>
                        </tr>
                        <tr>
                            <td>REUNION 100PAX</td>
                            <td><span class="date">6/15/2020</span></td>
                            <td>75,000</td>
                            <td>
                                <button class="accept-btn">Accept</button>
                                <button class="decline-btn">Decline</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </section>

            <section class="services-messages">
                <div class="services">
                    <h3>Your Services:</h3>
                    <div class="service-card">
                        <img src="images/catering.jpg" alt="Catering Service" />
                        <p>Catering Service</p>
                        <p class="rating"><i class="fas fa-star"></i> 4.5</p>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="../js/header.js"></script>
</body>
</html>
