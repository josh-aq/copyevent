<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EventIntel - Booking Confirmed</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  background:#050505;
  color:white;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* NAVBAR */
.navbar { 
  width: 100%;
  padding: 18px 50px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo-text {
  font-size: 26px;
  font-weight: 800;
  color: #f3c547;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 18px;
}

.nav-links button {
  padding: 8px 18px;
  border-radius: 12px;
  border: 1px solid rgba(255, 215, 0, 0.3);
  background: transparent;
  color: white;
  cursor: pointer;
}

.nav-links button:hover,
.nav-links .active {
  background: rgba(255, 215, 0, 0.12);
  color: #f3c547;
}

.profile-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1px solid rgba(255, 215, 0, 0.35);
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
}

.profile-btn i {
  color: #f3c547;
}

/* MAIN */
.container{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

/* CONFIRMATION CARD */
.card{
  background:#0f0f0f;
  border:1px solid rgba(255,215,0,.15);
  border-radius:30px;
  padding:50px;
  text-align:center;
  max-width:600px;
  width:100%;
  box-shadow:0 20px 50px rgba(255,215,0,.1);
}

/* ICON */
.success-icon{
  width:90px;
  height:90px;
  margin:auto;
  border-radius:50%;
  background:linear-gradient(135deg,#fff2ab,#f3c547,#c99208);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  color:#111;
  margin-bottom:20px;
}

/* TEXT */
.card h1{
  font-size:32px;
  margin-bottom:10px;
}

.card p{
  color:#bbb;
  margin-bottom:25px;
  line-height:1.5;
}

/* BUTTONS */
.actions{
  display:flex;
  gap:15px;
  justify-content:center;
}

.btn{
  padding:12px 22px;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
  border:none;
}

.btn-primary{
  background:linear-gradient(135deg,#fff2ab,#f3c547,#c99208);
  color:#111;
}

.btn-outline{
  background:transparent;
  border:1px solid rgba(255,215,0,.3);
  color:#f3c547;
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 20px rgba(255,215,0,.2);
}

</style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo-text">EventIntel</div>

  <div class="nav-links">
    <button>Home</button>
    <button>Create Event</button>
    <button class="active">Your Events</button>

    <div class="profile-btn">
      <i class="fa-regular fa-user"></i>
    </div>
  </div>
</div>

<!-- CONTENT -->
<div class="container">
  <div class="card">

    <div class="success-icon">
      <i class="fa-solid fa-check"></i>
    </div>

    <h1>Booking Confirmed</h1>
    <p>
      Your event has been successfully booked! All details have been saved and 
      our team is preparing everything for your special event.
    </p>

    <div class="actions">
      <button class="btn btn-primary">View Event</button>
      <button class="btn btn-outline">Back to Home</button>
    </div>

  </div>
</div>

</body>
</html>
