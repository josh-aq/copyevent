<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EventIntel Homepage</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #050505;
      color: white;
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      z-index: 0;
    }

    body::before {
      width: 450px;
      height: 450px;
      background: rgba(255, 196, 0, 0.10);
      top: -160px;
      left: -120px;
    }

    body::after {
      width: 520px;
      height: 520px;
      background: rgba(255, 215, 0, 0.07);
      bottom: -220px;
      right: -140px;
    }

    .container {
      width: 100%;
      height: 100%;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
    }

    /* Navigation */
    .navbar {
      width: 100%;
      padding: 18px 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 3;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, #ffd54a, #b8860b);
      display: flex;
      justify-content: center;
      align-items: center;
      color: black;
      font-size: 20px;
      font-weight: 900;
      box-shadow: 0 0 14px rgba(255, 215, 0, 0.25);
    }

    .logo-text {
      font-size: 26px;
      font-weight: 800;
      color: #f3c547;
      letter-spacing: 1px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .nav-links button {
      padding: 8px 18px;
      border-radius: 12px;
      border: 1px solid rgba(255, 215, 0, 0.3);
      background: transparent;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .nav-links button:hover,
    .nav-links .active {
      background: rgba(255, 215, 0, 0.12);
      color: #f3c547;
      box-shadow: 0 0 14px rgba(255, 215, 0, 0.12);
    }

    .profile-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(255, 215, 0, 0.35);
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .profile-btn:hover {
      background: rgba(255, 215, 0, 0.12);
      box-shadow: 0 0 14px rgba(255, 215, 0, 0.18);
    }

    .profile-btn i {
      color: #f3c547;
      font-size: 18px;
    }

    /* Main Content */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 30px 10px;
      margin-top: -20px;
      position: relative;
      z-index: 2;
    }

    .subtitle {
      color: #d4a017;
      font-size: 12px;
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .hero h1 {
      font-size: 52px;
      line-height: 1.1;
      font-weight: 900;
      max-width: 780px;
    }

    .hero h1 span {
      display: block;
      background: linear-gradient(to right, #ffe17a, #d4a017, #b8860b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      margin-top: 18px;
      font-size: 16px;
      color: #cccccc;
      max-width: 680px;
      line-height: 1.5;
    }

    .button-group {
      margin-top: 40px;
      display: flex;
      gap: 18px;
    }

    .action-btn {
      width: 240px;
      height: 72px;
      border-radius: 18px;
      border: 2px solid #d4a017;
      background: rgba(20, 20, 20, 0.95);
      color: #f3c547;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s ease;
      box-shadow: 0 0 14px rgba(255, 215, 0, 0.10);
    }

    .action-btn.primary {
      background: linear-gradient(to right, #ffd54a, #b8860b);
      color: black;
      border: none;
      box-shadow: 0 0 28px rgba(255, 215, 0, 0.25);
    }

    .action-btn:hover {
      transform: translateY(-6px) scale(1.01);
      background: rgba(255, 215, 0, 0.08);
    }

    .action-btn.primary:hover {
      background: linear-gradient(to right, #ffe17a, #c99700);
    }

    /* Event Gallery (FULLSCREEN BACKGROUND LAYER) */
    .event-gallery {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: flex;
      gap: 0;
      overflow: hidden;
      z-index: 0;
      opacity: 0.28;
      filter: brightness(0.65) saturate(0.9);
    }

    /* global dark blend for seamless UI integration */
    .event-gallery::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(
        circle at center,
        rgba(0,0,0,0.35) 0%,
        rgba(0,0,0,0.75) 100%
      );
      z-index: 2;
      pointer-events: none;
    }

    .event-card {
      flex: 1;
      height: 100%;
      border-radius: 0;
      overflow: hidden;
      position: relative;
      border: none;
      box-shadow: none;
      cursor: default;
      transition: 0.3s ease;
    }

    .event-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(
        circle at center,
        rgba(0,0,0,0) 45%,
        rgba(0,0,0,0.55) 100%
      );
      z-index: 1;
    }

    .event-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.65) contrast(1.15) saturate(0.85);
      transform: scale(1.05);
    }

    .event-card:hover {
      transform: none;
      box-shadow: none;
    }
  </style>
</head>
<body>
