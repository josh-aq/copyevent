<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EventIntel - Your Events</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: #050505;
      color: white;
      min-height: 100vh;
    }

    .container {
      max-width: 1600px;
      margin: auto;
      padding: 6px 48px 40px;
    }

    /* NAVBAR */
    .navbar {
      width: 100%;
      padding: 6px 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 26px;
      font-weight: 800;
      color: #f3c547;
      letter-spacing: 1px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .nav-links button {
      padding: 8px 18px;
      border-radius: 12px;
      border: 1px solid rgba(255, 215, 0, 0.3);
      background: transparent;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .nav-links button:hover,
    .nav-links .active {
      background: rgba(255, 215, 0, 0.12);
      color: #f3c547;
      box-shadow: 0 0 14px rgba(255, 215, 0, 0.12);
    }

    .profile-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(255, 215, 0, 0.35);
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #f3c547;
      cursor: pointer;
    }

    /* HEADER */
    .header {
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .header p {
      color: #aaaaaa;
    }

    /* GRID */
    .events-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .event-card {
      background: rgba(15,15,15,.9);
      border: 1px solid rgba(255,215,0,.12);
      border-radius: 26px;
      overflow: hidden;
      transition: 0.3s ease;
    }

    .event-card:hover {
      transform: translateY(-6px);
      border-color: rgba(255,215,0,.3);
      box-shadow: 0 18px 40px rgba(243,197,71,.12);
    }

    .event-img {
      height: 200px;
      overflow: hidden;
    }

    .event-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(.7);
      transition: .3s;
    }

    .event-card:hover img {
      transform: scale(1.05);
      filter: brightness(.9);
    }

    .event-content {
      padding: 20px;
    }

    .event-content h3 {
      margin-bottom: 10px;
      font-size: 20px;
    }

    .event-info {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 14px;
      color: #cfcfcf;
      margin-bottom: 15px;
    }

    .event-info i {
      color: #f3c547;
      margin-right: 6px;
    }

    .status {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      margin-bottom: 14px;
    }

    .status.upcoming {
      background: rgba(255,215,0,.12);
      color: #f3c547;
    }

    .status.completed {
      background: rgba(100,255,150,.12);
      color: #7dffb0;
    }

    .card-actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 10px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
    }

    .btn-primary {
      background: linear-gradient(135deg, #fff2ab, #f3c547, #c99208);
      color: #111;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid rgba(255,215,0,.3);
      color: #f3c547;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(243,197,71,.2);
    }
  </style>

</head>
<body>

  <div class="container">

<div class="navbar">
  <div class="logo">EventIntel</div>

  <div class="nav-links">
    <button>Home</button>
    <button>Create Event</button>
    <button class="active">Your Events</button>

    <div class="profile-btn">
      <i class="fa-regular fa-user"></i>
    </div>
  </div>
</div>

<div class="header">
  <h1>Your Events</h1>
  <p>Manage and track all your upcoming and completed events.</p>
</div>

<div class="events-grid">

  <div class="event-card">
    <div class="event-img">
      <img src="https://images.unsplash.com/photo-1519167758481-83f550bb49b3?auto=format&fit=crop&w=800&q=80">
    </div>
    <div class="event-content">
      <span class="status upcoming">Upcoming</span>
      <h3>Wedding Celebration</h3>
      <div class="event-info">
        <div><i class="fa-solid fa-calendar"></i> June 15, 2026</div>
        <div><i class="fa-solid fa-location-dot"></i> Manila</div>
      </div>
      <div class="card-actions">
        <button class="btn btn-primary">View</button>
        <button class="btn btn-outline">Create Invitation</button>
      </div>
    </div>
  </div>

  <div class="event-card">
    <div class="event-img">
      <img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&w=800&q=80">
    </div>
    <div class="event-content">
      <span class="status upcoming">Upcoming</span>
      <h3>Music Concert</h3>
      <div class="event-info">
        <div><i class="fa-solid fa-calendar"></i> July 2, 2026</div>
        <div><i class="fa-solid fa-location-dot"></i> Quezon City</div>
      </div>
      <div class="card-actions">
        <button class="btn btn-primary">View</button>
        <button class="btn btn-outline">Edit Invitation</button>
      </div>
    </div>
  </div>

  <div class="event-card">
    <div class="event-img">
      <img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d?auto=format&fit=crop&w=800&q=80">
    </div>
    <div class="event-content">
      <span class="status completed">Completed</span>
      <h3>Corporate Seminar</h3>
      <div class="event-info">
        <div><i class="fa-solid fa-calendar"></i> March 10, 2026</div>
        <div><i class="fa-solid fa-location-dot"></i> Makati</div>
      </div>
      <div class="card-actions">
        <button class="btn btn-primary">View</button>
        <button class="btn btn-outline">Details</button>
      </div>
    </div>
  </div>

</div>
  </div>

</body>
</html>
