<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EventIntel - Venue Location</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: #050505;
      color: white;
      min-height: 100vh;
    }

    .container {
      max-width: 1600px;
      margin: auto;
      padding: 6px 48px 30px;
    }

    /* NAVBAR (same as your system) */
    .navbar {
      width: 100%;
      padding: 6px 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 26px;
      font-weight: 800;
      color: #f3c547;
      letter-spacing: 1px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .nav-links button {
      padding: 8px 18px;
      border-radius: 12px;
      border: 1px solid rgba(255, 215, 0, 0.3);
      background: transparent;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .nav-links button:hover,
    .nav-links .active {
      background: rgba(255, 215, 0, 0.12);
      color: #f3c547;
      box-shadow: 0 0 14px rgba(255, 215, 0, 0.12);
    }

    .profile-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(255, 215, 0, 0.35);
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #f3c547;
      cursor: pointer;
    }

    /* MAP SECTION */
    .map-wrapper {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 28px;
    }

    .map-box {
      width: 100%;
      height: 600px;
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid rgba(255,215,0,.12);
      background: #111;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      filter: grayscale(1) contrast(1.2) brightness(.8);
    }

    /* SIDE INFO */
    .info-card {
      background: rgba(15,15,15,.9);
      border: 1px solid rgba(255,215,0,.12);
      border-radius: 28px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .info-card h2 {
      font-size: 30px;
      margin-bottom: 10px;
    }

    .info-card p {
      color: #bdbdbd;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .location-details {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 25px;
    }

    .location-details div {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #d6d6d6;
      font-size: 14px;
    }

    .location-details i {
      color: #f3c547;
    }

    .action-buttons {
      display: flex;
      gap: 14px;
    }

    .btn {
      flex: 1;
      height: 52px;
      border-radius: 14px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: 0.3s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #fff2ab, #f3c547, #c99208);
      color: #111;
    }

    .btn-outline {
      background: transparent;
      color: #f3c547;
      border: 1px solid rgba(255,215,0,.3);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(243,197,71,.2);
    }

  </style>

</head>
<body>

  <div class="container">

<div class="navbar">
  <div class="logo">EventIntel</div>

  <div class="nav-links">
    <button>Home</button>
    <button class="active">Create Event</button>
    <button>Your Events</button>

    <div class="profile-btn">
      <i class="fa-regular fa-user"></i>
    </div>
  </div>
</div>

<div class="map-wrapper">

  <div class="map-box">
    <iframe
      src="https://www.google.com/maps?q=Manila+Philippines&output=embed">
    </iframe>
  </div>

  <div class="info-card">
    <div>
      <h2>The Grand Pavilion</h2>
      <p>
        Located in the heart of the city, this premium venue is easily accessible
        and surrounded by hotels, restaurants, and transport hubs.
      </p>

      <div class="location-details">
        <div><i class="fa-solid fa-location-dot"></i> Manila, Philippines</div>
        <div><i class="fa-solid fa-road"></i> Near major highways</div>
        <div><i class="fa-solid fa-car"></i> Parking available</div>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn btn-primary">Book Venue</button>
      <button class="btn btn-outline">Back</button>
    </div>
  </div>

</div>

  </div>

</body>
</html>
